#
# Use this configuration file to control what RobotPy packages are installed
# on your RoboRIO
#

[tool.robotpy]

# Version of robotpy this project depends on
robotpy_version = "2026.2.2"

# Which optional robotpy components should be installed?
# -> equivalent to `pip install robotpy[extra1, ...]
components = [
    # "all",
    "apriltag",
    "commands2",
    # "cscore",
    # "romi",
    # "sim",
    # "xrp",
]

# Other pip packages to install, such as vendor packages (each element
# is equivalent to a line in requirements.txt)
requires = [
    "phoenix6",
    # "robotpy-rev",
    "robotpy-pathplannerlib",
    "photonlibpy == 2026.3.2"
]

# Enables Isolated Test Mode
[tool.robotpy.pyfrc]
isolated = true

[tool.ruff]
line-length = 100

[tool.ruff.lint]
# PEP 8 style (E/W), pyflakes correctness (F), and import ordering (I).
select = ["E", "W", "F", "I"]

[tool.ruff.lint.isort]
combine-as-imports = true
known-first-party = ["constants", "subsystems", "robot", "robot_container"]

[tool.ruff.lint.per-file-ignores]
# pyfrc's test harness relies on a star import to pull in its shared tests.
"tests/pyfrc_test.py" = ["F403"]

[tool.pyright]
typeCheckingMode = "basic"
# pyfrc's shared test harness is imported with a wildcard by design.
reportWildcardImportFromLibrary = "none"